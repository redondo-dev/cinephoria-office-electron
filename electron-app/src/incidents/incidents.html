<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinephoria Office - Gestion des Incidents</title>
    <link rel="stylesheet" href="incidents.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🎬 Cinephoria Office - Gestion des Incidents</h1>
            <p>Signaler et consulter les installations défaillantes</p>
        </header>

        <main>
            <!-- Formulaire de signalement -->
            <section class="form-section">
                <h2>Signaler une installation défaillante</h2>
                <form id="incidentForm">
                    <div class="form-group">
                        <label for="roomSelect">Salle *</label>
                        <select id="roomSelect" required>
                            <option value="">Sélectionnez une salle</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="equipmentSelect">Installation défaillante *</label>
                        <select id="equipmentSelect" required>
                            <option value="">Sélectionnez une installation</option>
                            <option value="Siège cassé">Siège cassé</option>
                            <option value="Projecteur défaillant">Projecteur défaillant</option>
                            <option value="Écran endommagé">Écran endommagé</option>
                            <option value="Climatisation HS">Climatisation HS</option>
                            <option value="Éclairage défectueux">Éclairage défectueux</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description détaillée *</label>
                        <textarea id="description" rows="3" placeholder="Décrivez précisément l'installation défaillante..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Signaler l'incident</button>
                </form>
            </section>

            <!-- Liste des incidents -->
            <section class="incidents-section">
                <h2>Installations défaillantes signalées</h2>
                <div id="incidentsList" class="incidents-list">
                    <div class="loading">Chargement...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="../shared/api.js"></script>
    <script src="incidents.js"></script>
</body>
</html>
